<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deploy Dashboard — {{PROJECT_NAME}}</title>
  <style>
    :root {
      --coral: #E8735A;
      --sandy: #F4A261;
      --sunrise: #FFD166;
      --bg: #1a1a2e;
      --surface: #16213e;
      --text: #eee;
      --text-muted: #999;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
    }

    h1 {
      color: var(--sunrise);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border-radius: 8px;
      padding: 1.5rem;
      border-left: 4px solid var(--sunrise);
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: bold;
      color: var(--sunrise);
    }

    .stat-card .label {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }

    .timeline {
      list-style: none;
    }

    .timeline li {
      background: var(--surface);
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.success { background: var(--sunrise); }
    .status-dot.failure { background: var(--coral); }
    .status-dot.rollback { background: var(--sandy); }

    .deploy-info { flex: 1; }
    .deploy-info .version { font-weight: bold; }
    .deploy-info .meta { color: var(--text-muted); font-size: 0.85rem; }

    .deploy-time {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: right;
    }
  </style>
</head>
<body>
  <h1>⚡ Deploy Dashboard</h1>
  <p class="subtitle">{{PROJECT_NAME}} — {{ENVIRONMENT}}</p>

  <div class="stats">
    <div class="stat-card">
      <div class="value" id="totalDeploys">—</div>
      <div class="label">Total Deploys</div>
    </div>
    <div class="stat-card">
      <div class="value" id="successRate">—</div>
      <div class="label">Success Rate</div>
    </div>
    <div class="stat-card">
      <div class="value" id="currentVersion">—</div>
      <div class="label">Current Version</div>
    </div>
    <div class="stat-card">
      <div class="value" id="lastDeploy">—</div>
      <div class="label">Last Deploy</div>
    </div>
  </div>

  <h2 style="margin-bottom: 1rem;">Deploy Timeline</h2>
  <ul class="timeline" id="timeline">
    <!-- Populated by JS from deploy-history API -->
    <li>
      <div class="status-dot success"></div>
      <div class="deploy-info">
        <div class="version">v1.0.0</div>
        <div class="meta">by openclaw (ai) — abc1234</div>
      </div>
      <div class="deploy-time">Just now</div>
    </li>
  </ul>

  <script>
    // Template: replace API_BASE with your deploy-history endpoint
    const API_BASE = '{{API_BASE}}/api';

    async function loadDashboard() {
      try {
        const [historyRes, statsRes] = await Promise.all([
          fetch(`${API_BASE}/history?limit=20`),
          fetch(`${API_BASE}/stats`)
        ]);
        const history = await historyRes.json();
        const stats = await statsRes.json();

        document.getElementById('totalDeploys').textContent = stats.total || '—';
        document.getElementById('successRate').textContent = stats.successRate ? `${stats.successRate}%` : '—';
        document.getElementById('currentVersion').textContent = history.results?.[0]?.version || '—';
        document.getElementById('lastDeploy').textContent = history.results?.[0]?.timestamp
          ? new Date(history.results[0].timestamp).toLocaleDateString()
          : '—';

        const timeline = document.getElementById('timeline');
        timeline.innerHTML = (history.results || []).map(e => `
          <li>
            <div class="status-dot ${e.status}"></div>
            <div class="deploy-info">
              <div class="version">v${e.version}</div>
              <div class="meta">by ${e.actor} (${e.actorType}) — ${(e.commitSha || '').slice(0, 7)}</div>
            </div>
            <div class="deploy-time">${new Date(e.timestamp).toLocaleString()}</div>
          </li>
        `).join('');
      } catch (err) {
        console.error('Failed to load deploy dashboard:', err);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
