<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testing Dashboard</title>
  <style>
    :root {
      --coral: #E8735A;
      --amber: #F4A261;
      --gold: #FFD166;
      --bg: #1a1a2e;
      --surface: #16213e;
      --text: #eee;
      --text-muted: #aaa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--coral), var(--amber), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .subtitle { color: var(--text-muted); margin-bottom: 2rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card h2 {
      font-size: 1.1rem;
      color: var(--amber);
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin: 0.25rem;
      transition: transform 0.1s, opacity 0.2s;
    }

    .btn:hover { transform: translateY(-1px); opacity: 0.9; }
    .btn:active { transform: translateY(0); }

    .btn-coral { background: var(--coral); color: white; }
    .btn-amber { background: var(--amber); color: white; }
    .btn-gold { background: var(--gold); color: #333; }
    .btn-danger { background: #e74c3c; color: white; }

    .seed-buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    #status {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 2rem;
    }

    #status h2 { color: var(--gold); margin-bottom: 0.75rem; }

    .log {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .log .pass { color: #2ecc71; }
    .log .fail { color: #e74c3c; }
    .log .info { color: var(--amber); }

    .coverage-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .coverage-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--coral), var(--gold));
      border-radius: 4px;
      transition: width 0.5s;
    }

    .stat { font-size: 2rem; font-weight: 700; }
    .stat-label { color: var(--text-muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>🧪 Testing Dashboard</h1>
  <p class="subtitle">Seed → Test → Reset — Operational Confidence in One Click</p>

  <div class="grid">
    <!-- Seed Panel -->
    <div class="card">
      <h2>🌱 Seed Data</h2>
      <div class="seed-buttons" id="seedButtons">
        <button class="btn btn-amber" onclick="seed(1)">Seed Step 1</button>
        <button class="btn btn-amber" onclick="seed(2)">Seed Step 2</button>
        <button class="btn btn-amber" onclick="seed(3)">Seed Step 3</button>
        <button class="btn btn-amber" onclick="seed(4)">Seed Final</button>
      </div>
    </div>

    <!-- Run Panel -->
    <div class="card">
      <h2>▶️ Run Tests</h2>
      <button class="btn btn-coral" onclick="runTests()">Run Full Journey Test</button>
      <button class="btn btn-gold" onclick="loadResults()">Refresh Results</button>
    </div>

    <!-- Reset Panel -->
    <div class="card">
      <h2>🗑️ Reset</h2>
      <button class="btn btn-danger" onclick="resetData()">Reset All Test Data</button>
      <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem;">
        Removes all rows where is_test = 1. Production data untouched.
      </p>
    </div>

    <!-- Coverage Panel -->
    <div class="card">
      <h2>📊 Coverage</h2>
      <div class="stat" id="coveragePct">—%</div>
      <div class="stat-label">Journey Steps Covered</div>
      <div class="coverage-bar"><div class="coverage-fill" id="coverageFill" style="width: 0%"></div></div>
    </div>
  </div>

  <!-- Status / Log -->
  <div id="status">
    <h2>📋 Output</h2>
    <div class="log" id="log">Ready. Click a button to begin.</div>
  </div>

  <script>
    const API = window.location.pathname.replace(/\/$/, '') + '/api';

    function log(msg, type = '') {
      const el = document.getElementById('log');
      const span = type ? `<span class="${type}">${msg}</span>` : msg;
      el.innerHTML += '\n' + span;
      el.scrollTop = el.scrollHeight;
    }

    async function seed(step) {
      log(`\n⏳ Seeding to Step ${step}...`, 'info');
      try {
        const res = await fetch(`${API}/seed/${step}`, { method: 'POST' });
        const data = await res.json();
        log(`✅ Seeded to Step ${step}: ${JSON.stringify(data.entitiesCreated || {})}`, 'pass');
      } catch (e) {
        log(`❌ Seed failed: ${e.message}`, 'fail');
      }
    }

    async function runTests() {
      log('\n⏳ Running Playwright suite...', 'info');
      try {
        const res = await fetch(`${API}/run`, { method: 'POST' });
        const data = await res.json();
        log(`${data.status === 'passed' ? '✅' : '❌'} ${data.passed}/${data.totalTests} passed (${data.duration}ms)`, data.status === 'passed' ? 'pass' : 'fail');
      } catch (e) {
        log(`❌ Test run failed: ${e.message}`, 'fail');
      }
    }

    async function resetData() {
      log('\n⏳ Resetting test data...', 'info');
      try {
        const res = await fetch(`${API}/reset`, { method: 'POST' });
        const data = await res.json();
        log('✅ All test data removed', 'pass');
      } catch (e) {
        log(`❌ Reset failed: ${e.message}`, 'fail');
      }
    }

    async function loadResults() {
      try {
        const res = await fetch(`${API}/results`);
        const data = await res.json();
        log(`\n📋 Last run: ${data.status} — ${data.passed}/${data.totalTests} (${new Date(data.timestamp).toLocaleString()})`, data.status === 'passed' ? 'pass' : 'fail');
      } catch (e) {
        log('No results yet.', 'info');
      }
    }

    async function loadCoverage() {
      try {
        const res = await fetch(`${API}/coverage`);
        const data = await res.json();
        document.getElementById('coveragePct').textContent = data.coveragePercent + '%';
        document.getElementById('coverageFill').style.width = data.coveragePercent + '%';
      } catch (e) { /* ignore */ }
    }

    loadCoverage();
  </script>
</body>
</html>
