<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex; flex-direction: column;
    justify-content: flex-start; align-items: center;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    color: #ffffff; overflow: hidden; padding: 80px;
  }
  .section-title {
    font-size: 48px; font-weight: 700;
    margin-bottom: 40px; text-align: center;
    color: #ffb347;
  }
  .warning-box {
    width: 100%; max-width: 1400px;
    border: 3px solid rgba(255, 179, 71, 0.6);
    border-radius: 24px; padding: 50px;
    background: rgba(255, 179, 71, 0.08);
  }
  .warning-icon {
    font-size: 60px; text-align: center;
    margin-bottom: 20px;
  }
  .warning-message {
    font-size: 34px; text-align: center;
    color: #ffe4bc; margin-bottom: 40px;
    line-height: 1.4;
  }
  .callouts {
    display: flex; flex-direction: column; gap: 18px;
  }
  .callout {
    display: flex; align-items: flex-start;
    padding: 18px 24px;
    background: rgba(255, 179, 71, 0.1);
    border-left: 4px solid #ffb347;
    border-radius: 0 12px 12px 0;
  }
  .callout-icon {
    font-size: 24px; margin-right: 16px;
    color: #ffb347; flex-shrink: 0;
  }
  .callout-text {
    font-size: 28px; color: #ffe4bc;
    line-height: 1.3;
  }
</style>
</head>
<body>
  <div class="section-title">{{title}}</div>
  <div class="warning-box">
    <div class="warning-icon">&#9888;</div>
    <div class="warning-message">{{message}}</div>
    <div class="callouts">{{callouts}}</div>
  </div>
</body>
</html>
