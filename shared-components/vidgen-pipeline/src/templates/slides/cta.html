<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    color: #ffffff; overflow: hidden;
  }
  .cta-title {
    font-size: 56px; font-weight: 700;
    text-align: center; max-width: 1200px;
    margin-bottom: 24px; line-height: 1.2;
  }
  .cta-subtitle {
    font-size: 32px; color: #b8b5ff;
    text-align: center; max-width: 1000px;
    margin-bottom: 50px; line-height: 1.4;
  }
  .cta-button {
    display: inline-block;
    padding: 22px 64px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 50px;
    font-size: 32px; font-weight: 700;
    letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
  }
</style>
</head>
<body>
  <div class="cta-title">{{title}}</div>
  <div class="cta-subtitle">{{subtitle}}</div>
  <div class="cta-button">{{action}}</div>
</body>
</html>
